<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ClinicOS{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block head %}{% endblock %}
</head>
<body>

{% block navbar %}
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand">🏥 ClinicOS</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a></li>
    <li><a href="/appointments" class="{% if active == 'appointments' %}active{% endif %}">Appointments</a></li>
    <li><a href="/patients" class="{% if active == 'patients' %}active{% endif %}">Patients</a></li>
    <li><a href="/doctors/settings" class="{% if active == 'settings' %}active{% endif %}">Settings</a></li>
    <li><a href="/logout">Logout</a></li>
  </ul>
</nav>
{% endblock %}

<div class="main-content">
  {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
