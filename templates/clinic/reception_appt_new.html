<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Appointment — ClinicOS</title>
  <link rel="stylesheet" href="/static/css/main.css?v=32" />
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
</head>
<body>

<nav class="navbar">
  <a href="/clinic/reception/dashboard" class="navbar-brand">ClinicOS</a>
  <div style="display:flex;align-items:center;gap:0;">
    <ul class="navbar-nav">
      <li><a href="/clinic/reception/dashboard">Dashboard</a></li>
      <li><a href="/clinic/reception" class="active">Schedule</a></li>
    </ul>
    <div class="navbar-controls">
      <button type="button" class="theme-toggle" onclick="toggleTheme()">
        <svg id="themeIconSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="themeIconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a href="/logout" class="logout-btn" title="Log out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </a>
    </div>
  </div>
</nav>

<div class="main-content">

<div class="page-header">
  <div>
    <h1 class="page-title">New Appointment</h1>
    <div class="page-sub">Booking as receptionist — {{ staff.name }}</div>
  </div>
  <a href="/clinic/reception{% if selected_doctor %}?doctor_id={{ selected_doctor.id }}{% endif %}" class="btn btn-secondary btn-sm">← Back</a>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="settings-card appt-form-card">
  <form method="post" action="/clinic/reception/appointments">

    <!-- Doctor Selector -->
    <p class="form-section-label">Doctor</p>
    <div class="form-row">
      <div class="form-group">
        <label for="doctor_id">Select Doctor</label>
        <select id="doctor_id" name="doctor_id" required onchange="clearSlots()">
          {% for doc in doctors %}
          <option value="{{ doc.id }}" {% if selected_doctor and doc.id == selected_doctor.id %}selected{% endif %}>
            Dr. {{ doc.name }} {% if doc.specialization %}— {{ doc.specialization }}{% endif %}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Patient Details -->
    <p class="form-section-label" style="margin-top:8px;">Patient Details</p>
    <div class="form-row">
      <div class="form-group">
        <label for="patient_name">Full Name</label>
        <input type="text" id="patient_name" name="patient_name"
               placeholder="e.g. Ramesh Kumar" required>
      </div>
      <div class="form-group">
        <label for="patient_phone">Phone Number</label>
        <input type="tel" id="patient_phone" name="patient_phone"
               placeholder="e.g. 9876543210"
               pattern="[0-9]{10}" minlength="10" maxlength="10"
               title="Enter a 10-digit phone number" required>
      </div>
    </div>

    <!-- Appointment Details -->
    <p class="form-section-label" style="margin-top:8px;">Appointment Details</p>
    <div class="form-row">
      <div class="form-group">
        <label for="appt_date">Date</label>
        <input type="date" id="appt_date" name="appt_date"
               value="{{ today }}" required>
      </div>
      <div class="form-group">
        <label for="appt_time">Time Slot</label>
        <select id="appt_time" name="appt_time" required>
          <option value="">Select a date first</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="appointment_type">Visit Type</label>
        <select id="appointment_type" name="appointment_type">
          <option value="new_patient">New Patient</option>
          <option value="follow_up" selected>Follow Up</option>
          <option value="emergency">Emergency</option>
        </select>
      </div>
      <div class="form-group">
        <label for="patient_notes">Notes (optional)</label>
        <input type="text" id="patient_notes" name="patient_notes"
               placeholder="Chief complaint, reason for visit...">
      </div>
    </div>

    <div class="appt-form-actions">
      <a href="/clinic/reception{% if selected_doctor %}?doctor_id={{ selected_doctor.id }}{% endif %}" class="btn btn-secondary btn-sm">Cancel</a>
      <button type="submit" class="btn btn-primary btn-sm">Book Appointment</button>
    </div>

  </form>
</div>

</div>

<script>
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('themeIconSun').style.display  = isLight ? 'block' : 'none';
  document.getElementById('themeIconMoon').style.display = isLight ? 'none'  : 'block';
}
document.addEventListener('DOMContentLoaded', function() {
  const isLight = document.documentElement.classList.contains('light');
  document.getElementById('themeIconSun').style.display  = isLight ? 'block' : 'none';
  document.getElementById('themeIconMoon').style.display = isLight ? 'none'  : 'block';
});

const dateInput  = document.getElementById('appt_date');
const doctorSel  = document.getElementById('doctor_id');
const timeSelect = document.getElementById('appt_time');

function fmt(t) {
  const [h, m] = t.split(':').map(Number);
  const p = h >= 12 ? 'PM' : 'AM';
  return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${p}`;
}

function clearSlots() {
  timeSelect.innerHTML = '<option value="">Select a date first</option>';
}

async function loadSlots(d) {
  const docId = doctorSel.value;
  timeSelect.innerHTML = '<option value="">Loading…</option>';
  try {
    const res  = await fetch(`/clinic/reception/slots?date=${d}&doctor_id=${docId}`);
    const data = await res.json();
    if (data.slots && data.slots.length) {
      timeSelect.innerHTML = data.slots.map(s =>
        `<option value="${s}">${fmt(s)}</option>`
      ).join('');
    } else {
      timeSelect.innerHTML = '<option value="">No slots available for this day</option>';
    }
  } catch {
    timeSelect.innerHTML = '<option value="">Error loading slots</option>';
  }
}

dateInput.addEventListener('change', () => { if (dateInput.value) loadSlots(dateInput.value); });
doctorSel.addEventListener('change', () => { if (dateInput.value) loadSlots(dateInput.value); });

window.addEventListener('DOMContentLoaded', () => {
  if (dateInput.value) loadSlots(dateInput.value);
  initPhoneInput(document.getElementById('patient_phone'));
});
</script>
</body>
</html>
